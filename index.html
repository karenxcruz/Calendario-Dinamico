<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Académico - Urbelania</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Calendario dinamico - Máster</h1>
                <a href="personal/index copy.html" class="btn-enlace"><i class="fa-solid fa-lock"></i> Mi Espacio Personal</a>
            </div>
        </header>
        <main>
            <div class="calendar-section">
                <div class="month-header">
                    <button id="prevMonth">&lt; Anterior</button>
                    <h2 id="monthYear"></h2>
                    <button id="nextMonth">Siguiente &gt;</button>
                </div>
                <div class="weekdays">
                    <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                </div>
                <div class="days" id="daysContainer"></div>
            </div>

            <div class="tasks-section">
                <h3>Actividades del día</h3>
                <p id="selectedDateText">Selecciona un día en el calendario.</p>
                
                <div class="task-form">
    <select id="subjectInput">
        <option value="" disabled selected>Selecciona la asignatura...</option>
        <option value="Aprender a través de metodologías activas">Aprender a través de las metodologías activas - PER 150557</option>
        <option value="Aula de información general">Aula de información general - PER 150557</option>
        <option value="Compromiso social sostenible">Compromiso social sostenible a través de metodologías activas - PER 150557</option>
        <option value="Investigación científica y práctica docente">Educación informada: Investigación científica y práctica docente - PER 150557</option>
        <option value="Desarrollo del pensamiento crítico">Estrategias metodológicas para el desarrollo del pensamiento crítico... - PER 150557</option>
        <option value="Desarrollo de competencia digital">Integración de metodologías para el desarrollo de la competencia digital - PER 150557</option>
        <option value="Prácticas académicas externas">Prácticas académicas externas - PER 150557</option>
        <option value="Trabajo fin máster">Trabajo fin máster - PER 150557</option>
    </select>
    
    <select id="categoryInput">
        <option value="" disabled selected>Categoría de la actividad...</option>
        <option value="Clase en directo">Clase en directo</option>
        <option value="Actividad">Envío de Actividad</option>
        <option value="Examen">Examen / Cuestionario</option>
        <option value="Foro">Participación en Foro</option>
        <option value="Lectura">Lectura / Documentación</option>
        <option value="Otra">Otra</option> 
    </select>

    <div class="time-container">
        <div class="time-box">
            <label>Hora (Inicio):</label>
            <input type="time" id="timeInput" title="Hora de inicio">
        </div>
        <div class="time-box" id="endTimeContainer" style="display: none;">
            <label>Hora (Fin):</label>
            <input type="time" id="endTimeInput" title="Hora de fin">
        </div>
    </div>

    <textarea id="descInput" placeholder="Pequeña descripción (Ej: Leer capítulo 2 y hacer resumen)"></textarea>
    
    <button id="addTaskBtn">Guardar Actividad</button>
</div>

                <div id="taskList"></div>
            </div>
        </main>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
